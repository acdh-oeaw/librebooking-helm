{{- if .Values.config.htaccessConfigMapName }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.htaccessConfigMapName }}
  labels:
    {{- include "librebooking.labels" . | nindent 4 }}
data:
  .htaccess: |
    RewriteEngine On
    
    # Internal rewrite: Redirect requests that are not under /Web to /Web
    # Using PT (pass through) flag instead of R=301 to avoid external redirect
    # This avoids generating a Location header with the wrong port
    RewriteCond %{REQUEST_URI} !^/Web(/|$)
    RewriteRule ^(.*)$ /Web/$1 [PT,L]
    
    # Uncomment the following two lines to force HTTPS (use H flag for internal handling)
    #RewriteCond %{HTTPS} off
    #RewriteRule .* https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
    
    #Header Set Access-Control-Allow-Origin "*"
    #Header add Access-Control-Allow-Headers "origin, x-requested-with, content-type"
    #Header add Access-Control-Allow-Methods "PUT, GET, POST, DELETE, OPTIONS"
    #php_value max_input_vars 10000
{{- end }}
