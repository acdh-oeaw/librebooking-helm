{{- if .Values.config.htaccessConfigMapName }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.htaccessConfigMapName }}
  labels:
    {{- include "librebooking.labels" . | nindent 4 }}
data:
  .htaccess: |
    RewriteEngine On
    RewriteBase /
    
    # Don't rewrite requests already under /Web
    RewriteRule ^Web/ - [L]
    
    # Rewrite all other requests to /Web
    RewriteRule ^(.*)$ Web/$1 [L]
    
    # Auto-prepend file for initialization (defines ROOT_DIR, handles X-Forwarded headers, etc.)
    php_value auto_prepend_file "/var/www/html/prepend.php"
    
    # Error handling
    php_value error_reporting "E_ALL & ~E_WARNING"
    php_flag display_errors Off
    
    #Header Set Access-Control-Allow-Origin "*"
    #Header add Access-Control-Allow-Headers "origin, x-requested-with, content-type"
    #Header add Access-Control-Allow-Methods "PUT, GET, POST, DELETE, OPTIONS"
    #php_value max_input_vars 10000
{{- end }}
