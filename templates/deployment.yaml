apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "librebooking.fullname" . }}
  labels:
    {{- include "librebooking.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "librebooking.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "librebooking.selectorLabels" . | nindent 8 }}
      annotations:
        # Rollout trigger for external config changes
        config/reload-token: {{ .Values.config.reloadToken | default "v1" | quote }}
        {{- if .Values.podAnnotations }}
        {{- toYaml .Values.podAnnotations | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      serviceAccountName: {{ include "librebooking.serviceAccountName" . }}

      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      containers:
        - name: librebooking
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            # App-specific settings
            - name: LB_DEFAULT_TIMEZONE
              value: "{{ .Values.app.defaultTimezone | default "UTC" }}"
            - name: LB_LOGGING_FOLDER
              value: "{{ .Values.app.loggingFolder | default "/var/log/librebooking" }}"
            - name: LB_LOGGING_LEVEL
              value: "{{ .Values.app.loggingLevel | default "INFO" }}"
            - name: LB_LOGGING_SQL
              value: "{{ .Values.app.loggingSql | default "false" }}"
            {{- if .Values.app.appPath }}
            - name: APP_PATH
              value: "{{ .Values.app.appPath }}"
            {{- end }}

            # Installer password (from Secret)
            - name: LB_INSTALL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.existingSecretName | default (printf "%s-install" (include "librebooking.fullname" .)) }}
                  key: {{ .Values.app.existingSecretKey | default "LB_INSTALL_PASSWORD" }}

            # Database configuration
            {{- if .Values.externalDatabase.enabled }}
            - name: LB_DATABASE_HOSTSPEC
              value: "{{ .Values.externalDatabase.hostspec }}"
            - name: LB_DATABASE_NAME
              value: "{{ .Values.externalDatabase.name }}"
            - name: LB_DATABASE_USER
              value: "{{ .Values.externalDatabase.user }}"
            - name: LB_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecretName | default (printf "%s-db" (include "librebooking.fullname" .)) }}
                  key: {{ .Values.externalDatabase.existingSecretKey | default "db-password" }}
            {{- else if .Values.mariadb.enabled }}
            - name: LB_DATABASE_HOSTSPEC
              value: {{ printf "%s-mariadb" (include "librebooking.fullname" .) | quote }}
            - name: LB_DATABASE_NAME
              value: "{{ .Values.mariadb.auth.database }}"
            - name: LB_DATABASE_USER
              value: "{{ .Values.mariadb.auth.username }}"
            - name: LB_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mariadb.auth.existingSecretName | default (printf "%s-mariadb" (include "librebooking.fullname" .)) }}
                  key: mysql-password
            {{- end }}

            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          livenessProbe:
            httpGet:
              path: {{ if .Values.app.appPath }}{{ printf "%s/" .Values.app.appPath }}{{ else }}/{{ end }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 15 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 6 }}

          readinessProbe:
            httpGet:
              path: {{ if .Values.app.appPath }}{{ printf "%s/" .Values.app.appPath }}{{ else }}/{{ end }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default 20 }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds | default 10 }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            # Mount read-only config files from external ConfigMaps/Secrets
            {{- if or .Values.config.bookingConfigMapName .Values.config.bookingSecretName }}
            - name: booking-config
              mountPath: /config/config.php
              subPath: config.php
              readOnly: true
            {{- end }}
            {{- if or .Values.config.ldapConfigMapName .Values.config.ldapSecretName }}
            - name: ldap-config
              mountPath: /config/ldap.config.php
              subPath: ldap.config.php
              readOnly: true
            {{- end }}

            {{- if .Values.persistence.logs.enabled }}
            - name: logs
              mountPath: "{{ .Values.persistence.logs.mountPath }}"
            {{- end }}
            {{- if .Values.persistence.uploadsImages.enabled }}
            - name: uploads-images
              mountPath: "{{ .Values.persistence.uploadsImages.mountPath }}"
            {{- end }}
            {{- if .Values.persistence.uploadsReservation.enabled }}
            - name: uploads-reservation
              mountPath: "{{ .Values.persistence.uploadsReservation.mountPath }}"
            {{- end }}
            {{- if .Values.favicon.enabled }}
            - name: favicon
              mountPath: "{{ .Values.favicon.path }}"
              subPath: "favicon.ico"
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

      volumes:
        # External booking config (ConfigMap or Secret), mounted as /config/config.php
        {{- if or .Values.config.bookingConfigMapName .Values.config.bookingSecretName }}
        - name: booking-config
          {{- if .Values.config.bookingSecretName }}
          secret:
            secretName: {{ .Values.config.bookingSecretName }}
            items:
              - key: config.php
                path: config.php
          {{- else }}
          configMap:
            name: {{ .Values.config.bookingConfigMapName }}
            items:
              - key: config.php
                path: config.php
          {{- end }}
        {{- end }}

        # External LDAP config (ConfigMap or Secret), mounted as /config/ldap.config.php
        {{- if or .Values.config.ldapConfigMapName .Values.config.ldapSecretName }}
        - name: ldap-config
          {{- if .Values.config.ldapSecretName }}
          secret:
            secretName: {{ .Values.config.ldapSecretName }}
            items:
              - key: ldap.config.php
                path: ldap.config.php
          {{- else }}
          configMap:
            name: {{ .Values.config.ldapConfigMapName }}
            items:
              - key: ldap.config.php
                path: ldap.config.php
          {{- end }}
        {{- end }}

        {{- if .Values.persistence.logs.enabled }}
        - name: logs
          {{- if .Values.persistence.logs.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.logs.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "librebooking.fullname" . }}-logs
          {{- end }}
        {{- end }}
        {{- if .Values.persistence.uploadsImages.enabled }}
        - name: uploads-images
          {{- if .Values.persistence.uploadsImages.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.uploadsImages.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "librebooking.fullname" . }}-uploads-images
          {{- end }}
        {{- end }}
        {{- if .Values.persistence.uploadsReservation.enabled }}
        - name: uploads-reservation
          {{- if .Values.persistence.uploadsReservation.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.uploadsReservation.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "librebooking.fullname" . }}-uploads-reservation
          {{- end }}
        {{- end }}
        {{- if .Values.favicon.enabled }}
        - name: favicon
          {{- if eq .Values.favicon.type "secret" }}
          secret:
            secretName: {{ .Values.favicon.name }}
          {{- else }}
          configMap:
            name: {{ .Values.favicon.name }}
          {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
