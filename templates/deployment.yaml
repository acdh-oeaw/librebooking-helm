apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "librebooking.fullname" . }}
  labels:
    {{- include "librebooking.labels" . | nindent 4 }}
spec:
  replicas: {{ default 1 .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "librebooking.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "librebooking.selectorLabels" . | nindent 8 }}
      annotations:
        config/reload-token: {{ default "v1" .Values.config.reloadToken | quote }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      serviceAccountName: {{ include "librebooking.serviceAccountName" . }}

      {{- if or .Values.config.bookingConfigMapName .Values.config.bookingSecretName .Values.config.ldapConfigMapName .Values.config.ldapSecretName .Values.config.apacheConfigMapName }}
      initContainers:
        - name: copy-config
          image: busybox:1.36.1
          command:
            - sh
            - -c
            - |
              set -e
              # Ensure /config directory exists with proper permissions
              mkdir -p /config
              
              echo "=== Init container: checking source directories ==="
              
              {{- if or .Values.config.bookingConfigMapName .Values.config.bookingSecretName }}
              echo "Checking /source/booking:"
              ls -la /source/booking/ || echo "Directory not found or empty"
              if [ -f /source/booking/config.php ]; then
                echo "Copying /source/booking/config.php to /config/config.php"
                cp /source/booking/config.php /config/config.php
              else
                echo "WARNING: /source/booking/config.php not found"
              fi
              {{- end }}
              
              {{- if or .Values.config.ldapConfigMapName .Values.config.ldapSecretName }}
              echo "Checking /source/ldap:"
              ls -la /source/ldap/ || echo "Directory not found or empty"
              if [ -f /source/ldap/ldap.config.php ]; then
                echo "Copying /source/ldap/ldap.config.php to /config/ldap.config.php"
                cp /source/ldap/ldap.config.php /config/ldap.config.php
              else
                echo "WARNING: /source/ldap/ldap.config.php not found"
              fi
              {{- end }}
              
              {{- if .Values.config.apacheConfigMapName }}
              echo "Checking /source/apache:"
              ls -la /source/apache/ || echo "Directory not found or empty"
              if [ -f /source/apache/proxy-headers.conf ]; then
                echo "Copying /source/apache/proxy-headers.conf to /config/proxy-headers.conf"
                cp /source/apache/proxy-headers.conf /config/proxy-headers.conf
              else
                echo "WARNING: /source/apache/proxy-headers.conf not found"
              fi
              {{- end }}
              
              # Set ownership to www-data (UID 33) and permissions so sed -i can create temp files
              echo "Setting permissions on /config directory and files..."
              chown -R 33:33 /config
              chmod 775 /config
              find /config -type f -name "*.php" -exec chmod 644 {} \;
              find /config -type f -name "*.conf" -exec chmod 644 {} \;
              
              # List final state for verification
              echo "=== Final state of /config directory ==="
              ls -la /config/
          volumeMounts:
            - name: config-copy
              mountPath: /config
            {{- if or .Values.config.bookingConfigMapName .Values.config.bookingSecretName }}
            - name: booking-config
              mountPath: /source/booking
            {{- end }}
            {{- if or .Values.config.ldapConfigMapName .Values.config.ldapSecretName }}
            - name: ldap-config
              mountPath: /source/ldap
            {{- end }}
            {{- if .Values.config.apacheConfigMapName }}
            - name: apache-config
              mountPath: /source/apache
            {{- end }}
      {{- end }}

      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: librebooking
          image: {{ printf "%s:%s" .Values.image.repository (default "latest" .Values.image.tag) | quote }}
          imagePullPolicy: {{ default "IfNotPresent" .Values.image.pullPolicy | quote }}

          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: LB_DEFAULT_TIMEZONE
              value: {{ default "UTC" .Values.app.defaultTimezone | quote }}
            - name: LB_LOGGING_FOLDER
              value: {{ default "/var/log/librebooking" .Values.app.loggingFolder | quote }}
            - name: LB_LOGGING_LEVEL
              value: {{ default "INFO" .Values.app.loggingLevel | quote }}
            - name: LB_LOGGING_SQL
              value: {{ default "false" .Values.app.loggingSql | quote }}
            {{- if .Values.app.appPath }}
            - name: APP_PATH
              value: {{ .Values.app.appPath | quote }}
            {{- end }}

            # Installer password (from Secret)
            - name: LB_INSTALL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-install" (include "librebooking.fullname" .)) .Values.app.existingSecretName | quote }}
                  key: {{ default "LB_INSTALL_PASSWORD" .Values.app.existingSecretKey | quote }}

            # Database configuration
            {{- if .Values.externalDatabase.enabled }}
            - name: LB_DATABASE_HOSTSPEC
              value: {{ .Values.externalDatabase.hostspec | quote }}
            - name: LB_DATABASE_NAME
              value: {{ .Values.externalDatabase.name | quote }}
            - name: LB_DATABASE_USER
              value: {{ .Values.externalDatabase.user | quote }}
            - name: LB_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-db" (include "librebooking.fullname" .)) .Values.externalDatabase.existingSecretName | quote }}
                  key: {{ default "db-password" .Values.externalDatabase.existingSecretKey | quote }}
            {{- else if .Values.mariadb.enabled }}
            - name: LB_DATABASE_HOSTSPEC
              value: {{ printf "%s-mariadb" (include "librebooking.fullname" .) | quote }}
            - name: LB_DATABASE_NAME
              value: {{ .Values.mariadb.auth.database | quote }}
            - name: LB_DATABASE_USER
              value: {{ .Values.mariadb.auth.username | quote }}
            - name: LB_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default (printf "%s-mariadb" (include "librebooking.fullname" .)) .Values.mariadb.auth.existingSecretName | quote }}
                  key: mysql-password
            {{- end }}

            {{- if .Values.app.scriptUrl }}
            - name: LB_SCRIPT_URL
              value: {{ .Values.app.scriptUrl | quote }}
            {{- end }}

            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{ end }}

          {{ $l := default (dict) .Values.livenessProbe }}
          {{ $r := default (dict) .Values.readinessProbe }}

          livenessProbe:
            httpGet:
              path: {{ if .Values.app.appPath }}{{ printf "%s/" .Values.app.appPath }}{{ else }}/{{ end }}
              port: http
            initialDelaySeconds: {{ default 30 $l.initialDelaySeconds }}
            periodSeconds: {{ default 15 $l.periodSeconds }}
            failureThreshold: {{ default 6 $l.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ if .Values.app.appPath }}{{ printf "%s/" .Values.app.appPath }}{{ else }}/{{ end }}
              port: http
            initialDelaySeconds: {{ default 20 $r.initialDelaySeconds }}
            periodSeconds: {{ default 10 $r.periodSeconds }}
            failureThreshold: {{ default 3 $r.failureThreshold }}

          {{- if or .Values.config.ldapConfigMapName .Values.config.ldapSecretName .Values.config.apacheConfigMapName }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Create LDAP symlink if config file exists and symlink doesn't already exist
                    {{- if or .Values.config.ldapConfigMapName .Values.config.ldapSecretName }}
                    if [ -f /config/ldap.config.php ]; then
                      if ! [ -e /var/www/html/config/ldap.config.php ]; then
                        echo "Creating symlink: /var/www/html/config/ldap.config.php -> /config/ldap.config.php"
                        ln -s /config/ldap.config.php /var/www/html/config/ldap.config.php
                      fi
                    fi
                    {{- end }}
                    # Install Apache config if provided
                    {{- if .Values.config.apacheConfigMapName }}
                    if [ -f /config/proxy-headers.conf ]; then
                      if ! [ -e /etc/apache2/conf-enabled/proxy-headers.conf ]; then
                        echo "Installing Apache proxy headers configuration"
                        cp /config/proxy-headers.conf /etc/apache2/conf-enabled/proxy-headers.conf
                        # Reload Apache to apply new configuration
                        apache2ctl graceful
                      fi
                    fi
                    {{- end }}
          {{- end }}

          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            {{- if or .Values.config.bookingConfigMapName .Values.config.bookingSecretName .Values.config.ldapConfigMapName .Values.config.ldapSecretName .Values.config.apacheConfigMapName }}
            - name: config-copy
              mountPath: /config
            {{- end }}

            {{- $p := default (dict) .Values.persistence -}}
            {{- $logs := default (dict) $p.logs -}}
            {{- $images := default (dict) $p.uploadsImages -}}
            {{- $res := default (dict) $p.uploadsReservation -}}

            {{- if $logs.enabled }}
            - name: logs
              mountPath: {{ $logs.mountPath | quote }}
            {{- end }}
            {{- if $images.enabled }}
            - name: uploads-images
              mountPath: {{ $images.mountPath | quote }}
            {{- end }}
            {{- if $res.enabled }}
            - name: uploads-reservation
              mountPath: {{ $res.mountPath | quote }}
            {{- end }}

            {{- $fav := default (dict) .Values.favicon -}}
            {{- if $fav.enabled }}
            - name: favicon
              mountPath: {{ $fav.path | quote }}
              subPath: "favicon.ico"
              readOnly: true
            {{- end }}

            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

      volumes:
        {{- if or .Values.config.bookingConfigMapName .Values.config.bookingSecretName .Values.config.ldapConfigMapName .Values.config.ldapSecretName }}
        - name: config-copy
          emptyDir: {}
        {{- end }}

        {{- if or .Values.config.bookingConfigMapName .Values.config.bookingSecretName }}
        - name: booking-config
          {{- if .Values.config.bookingSecretName }}
          secret:
            secretName: {{ .Values.config.bookingSecretName | quote }}
            items:
              - key: config.php
                path: config.php
          {{- else }}
          configMap:
            name: {{ .Values.config.bookingConfigMapName | quote }}
            items:
              - key: config.php
                path: config.php
          {{- end }}
        {{- end }}

        {{- if or .Values.config.ldapConfigMapName .Values.config.ldapSecretName }}
        - name: ldap-config
          {{- if .Values.config.ldapSecretName }}
          secret:
            secretName: {{ .Values.config.ldapSecretName | quote }}
            items:
              - key: ldap.config.php
                path: ldap.config.php
          {{- else }}
          configMap:
            name: {{ .Values.config.ldapConfigMapName | quote }}
            items:
              - key: ldap.config.php
                path: ldap.config.php
          {{- end }}
        {{- end }}

        {{- if .Values.config.apacheConfigMapName }}
        - name: apache-config
          configMap:
            name: {{ .Values.config.apacheConfigMapName | quote }}
            items:
              - key: proxy-headers.conf
                path: proxy-headers.conf
        {{- end }}

        {{- $p := default (dict) .Values.persistence -}}
        {{- $logs := default (dict) $p.logs -}}
        {{- $images := default (dict) $p.uploadsImages -}}
        {{- $res := default (dict) $p.uploadsReservation -}}

        {{- if $logs.enabled }}
        - name: logs
          {{- if $logs.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ $logs.existingClaim | quote }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "librebooking.fullname" . }}-logs
          {{- end }}
        {{- end }}

        {{- if $images.enabled }}
        - name: uploads-images
          {{- if $images.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ $images.existingClaim | quote }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "librebooking.fullname" . }}-uploads-images
          {{- end }}
        {{- end }}

        {{- if $res.enabled }}
        - name: uploads-reservation
          {{- if $res.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ $res.existingClaim | quote }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "librebooking.fullname" . }}-uploads-reservation
          {{- end }}
        {{- end }}

        {{- $fav := default (dict) .Values.favicon -}}
        {{- if $fav.enabled }}
        - name: favicon
          {{- if eq (default "configmap" $fav.type) "secret" }}
          secret:
            secretName: {{ $fav.name | quote }}
          {{- else }}
          configMap:
            name: {{ $fav.name | quote }}
          {{- end }}
        {{- end }}

        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
