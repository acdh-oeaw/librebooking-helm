{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "librebooking.fullname" . }}
  labels:
    {{- include "librebooking.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | default "nginx" | quote }}
    # Fix URL generation behind proxy - ensure correct headers are passed to backend
    nginx.ingress.kubernetes.io/proxy-redirect-from: "http://$host:8080"
    nginx.ingress.kubernetes.io/proxy-redirect-to: "http://$host"
    nginx.ingress.kubernetes.io/proxy-redirect-from-https: "https://$host:8080"
    nginx.ingress.kubernetes.io/proxy-redirect-to-https: "https://$host"
    # Ensure proper X-Forwarded headers for correct URL generation in application
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $server_name;
      proxy_set_header X-Forwarded-Port $server_port;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Host $server_name;
    # Ensure SERVER_PORT is correct (443 for HTTPS, not internal 8080)
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path | default "/" | quote }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "librebooking.fullname" $ }}
                port:
                  number: {{ $.Values.service.port | default 8080 }}
          {{- end }}
    {{- end }}
{{- end }}
